<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LafaMarket - Marketplace</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0a3d62;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

nav{
background:#1e90ff;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

button{
background:#0a3d62;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:white;
border-left:2px solid #ccc;
padding:10px;
overflow:auto;
}

footer{
background:#0a3d62;
color:white;
text-align:center;
padding:10px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
LafaMarket
</header>

<nav>
<a href="#">Accueil</a>
<a href="#">Produits</a>
<a href="#">Vendre</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<h2>Produits populaires</h2>

<div class="products">

<div class="product">
<h3>iPhone 13</h3>
<p>Prix: 2 000 000 Ar</p>
<button onclick="addCart('iPhone 13')">Acheter</button>
</div>

<div class="product">
<h3>Ordinateur HP</h3>
<p>Prix: 1 500 000 Ar</p>
<button onclick="addCart('HP Laptop')">Acheter</button>
</div>

<div class="product">
<h3>Chaussure Nike</h3>
<p>Prix: 200 000 Ar</p>
<button onclick="addCart('Nike')">Acheter</button>
</div>

<div class="product">
<h3>Smart TV</h3>
<p>Prix: 1 200 000 Ar</p>
<button onclick="addCart('Smart TV')">Acheter</button>
</div>

</div>

</div>

<div class="cart">

<h3>Panier</h3>

<ul id="cartlist"></ul>

</div>

<footer>
LafaMarket © 2026
</footer>

<script>

let cart=[];

function addCart(product){

cart.push(product)

let list=document.getElementById("cartlist")

let li=document.createElement("li")

li.innerText=product

list.appendChild(li)

}

</script>

</body>
</html>
