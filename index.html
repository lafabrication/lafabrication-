<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LafaMarket</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0a66ff;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
border:none;
border-radius:5px;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

button{
background:#0a66ff;
color:white;
border:none;
padding:8px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.form{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

.panier{
position:fixed;
right:20px;
bottom:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
<div class="logo">LafaMarket</div>
<input class="search" id="search" placeholder="Rechercher produit">
</header>

<div class="container">

<div class="form">
<h3>Vendre un produit</h3>

<input id="name" placeholder="Nom produit">
<input id="price" placeholder="Prix">
<input id="image" placeholder="Lien image">

<button onclick="addProduct()">Ajouter produit</button>

</div>

<h2>Produits</h2>

<div class="products" id="products"></div>

</div>

<div class="panier">
🛒 Panier: <span id="cartCount">0</span>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

function renderProducts(){

let list = document.getElementById("products");
list.innerHTML="";

let search = document.getElementById("search").value.toLowerCase();

products
.filter(p=>p.name.toLowerCase().includes(search))
.forEach((p,i)=>{

list.innerHTML += `
<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<p>${p.price} Ar</p>

<button onclick="addCart()">Acheter</button>

</div>
`;

});

}

function addProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let image=document.getElementById("image").value;

if(!name || !price) return;

products.push({name,price,image});

localStorage.setItem("products",JSON.stringify(products));

renderProducts();

}

function addCart(){

cart.push(1);

document.getElementById("cartCount").innerText = cart.length;

}

document.getElementById("search").addEventListener("input",renderProducts);

renderProducts();

</script>

</body>
</html>
